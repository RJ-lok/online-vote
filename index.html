<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <marquee style="font-size: 20px;">Welcome to Online Voting System</marquee>
    </div>

    <div class="header">
        <img src="images.png" alt="ECI Logo">
        <h1>भारत निर्वाचन आयोग<br>Election Commission of India</h1>

        <div class="header-buttons">
            <a href="?vote=1" class="vote-btn">Vote</a>
            <form action="result.php" method="post">
                <input type="submit" value="View Results">
            </form>
        </div>
    </div>

    <div class="container">
        <div class="left-panel">
            <img src="images.jpeg" alt="Commissioner Image">
            <h3>
                <span style="color:rgb(255,255,0)">Dr. Vivek Joshi</span><br>
                Election Commissioner of India<br>
                called on the Hon’ble Vice-President of India<br>
                <span style="color:rgb(255,255,0)">Shri Jagdeep Dhankhar</span><br>
                at Vice-President’s Enclave
            </h3>
        </div>

        <div class="right-panel">
            <form class="login-box" action="vote.php" method="post">
                <h2>Vote Here</h2>
                <input type="text" name="voter_id" placeholder="Voting ID" required>
                <input type="text" name="aadhaar_last4" placeholder="Last 4 digits of Aadhaar" required>
                <br>
                <div class="button-group">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </div>
            </form>
        </div>
    </div>

    <script>
        // Show right-panel only if ?vote=1 is present in the URL
        window.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            if (params.get('vote') === '1') {
                document.querySelector('.right-panel').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
